{% extends "base.html" %}

{% block title %}Payment - DropBy.HOLLOW{% endblock %}

{% block extra_css %}
<style>
.payment-section {
    padding: 48px 0;
    max-width: 500px;
    margin: 0 auto;
}

.payment-section h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #f5f5f5;
    text-align: center;
    margin-bottom: 32px;
}

.payment-form {
    background: #141414;
    border-radius: 12px;
    padding: 32px;
}

.card-element {
    background: #1f1f1f;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
}

.card-element input {
    width: 100%;
    background: transparent;
    border: none;
    color: #f5f5f5;
    font-size: 1rem;
    outline: none;
}

.order-total {
    display: flex;
    justify-content: space-between;
    padding: 16px 0;
    border-top: 1px solid #2a2a2a;
    margin-top: 16px;
    font-size: 1.25rem;
    font-weight: 600;
    color: #f5f5f5;
}

.btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 8px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
    cursor: pointer;
    border: none;
    font-size: 1rem;
    width: 100%;
    text-align: center;
}

.btn-primary {
    background: #d4af37;
    color: #0a0a0a;
}

.btn-primary:hover {
    background: #e5c14b;
    box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
}

.test-notice {
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid #f59e0b;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    font-size: 0.875rem;
    color: #f59e0b;
    text-align: center;
}
</style>
{% endblock %}

{% block content %}
<div class="payment-section">
    <h1>Complete Payment</h1>
    
    <div class="payment-form">
        <div class="test-notice">
            🔒 Test Mode: This is a demo. No real payment will be processed.
        </div>
        
        <form method="POST" action="{{ url_for('main.payment', order_id=order.id) }}">
            <div class="form-group">
                <label>Card Number</label>
                <div class="card-element">
                    <input type="text" placeholder="4242 4242 4242 4242" maxlength="19">
                </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>Expiry Date</label>
                    <div class="card-element">
                        <input type="text" placeholder="MM/YY" maxlength="5">
                    </div>
                
                <div class="form-group">
                    <label>CVC</label>
                    <div class="card-element">
                        <input type="text" placeholder="123" maxlength="3">
                    </div>
            </div>
            
            <div class="order-total">
                <span>Total</span>
                <span>${{ "%.2f"|format(order.final_price) }}</span>
            </div>
            
            <button type="submit" class="btn btn-primary">Pay ${{ "%.2f"|format(order.final_price) }}</button>
        </form>
    </div>
{% endblock %}
</parameter>
</invoke>
</minimax:tool_call>
