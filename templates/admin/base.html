<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - DropBy.HOLLOW{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body class="admin-body">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <a href="{{ url_for('main.index') }}" class="logo">
                    <span class="logo-text">DropBy</span><span class="logo-accent">.HOLLOW</span>
                </a>
                <span class="admin-badge">Admin</span>
            </div>
            
            <nav class="admin-nav">
                <a href="{{ url_for('admin.dashboard') }}" class="admin-nav-link">
                    <span>📊</span> Dashboard
                </a>
                <a href="{{ url_for('admin.orders') }}" class="admin-nav-link">
                    <span>📦</span> Orders
                </a>
                <a href="{{ url_for('admin.products') }}" class="admin-nav-link">
                    <span>🛍️</span> Products
                </a>
                <a href="{{ url_for('main.index') }}" class="admin-nav-link">
                    <span>🏠</span> View Store
                </a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <header class="admin-header">
                <h1>{% block admin_title %}{% endblock %}</h1>
            </header>
            
            <div class="admin-content">
                {% block admin_content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
</parameter>
</invoke>
</minimax:tool_call>
